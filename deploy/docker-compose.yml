version: "3.9"

# Ocean2Joy v2.0 — production stack.
# Launch with:  cp .env.example .env   &&   docker compose up -d --build
# Nginx will expose the app on port 80.

services:
  mongo:
    image: mongo:7
    container_name: o2j_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./db_dump:/docker-entrypoint-initdb.d/db_dump:ro
      - ./scripts/restore_db.sh:/docker-entrypoint-initdb.d/restore_db.sh:ro
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME}
    networks: [o2j]

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: o2j_backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on: [mongo]
    networks: [o2j]

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    container_name: o2j_frontend
    restart: unless-stopped
    networks: [o2j]

  nginx:
    image: nginx:1.27-alpine
    container_name: o2j_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [backend, frontend]
    networks: [o2j]

volumes:
  mongo_data:
  backend_uploads:

networks:
  o2j:
    driver: bridge
