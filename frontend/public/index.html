<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0ea5e9" />

        <!-- Primary SEO -->
        <title>Ocean2Joy — Digital Video Production Studio</title>
        <meta name="description" content="Ocean2Joy is a boutique digital video production studio. End-to-end video creation through a transparent 12-stage workflow — pay only after you accept the final result." />
        <meta name="keywords" content="video production, digital video, video studio, post-production, script to screen, storyboard, motion graphics, explainer video, promo video, Ocean2Joy" />
        <meta name="author" content="Ocean2Joy" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://ocean2joy.com/" />

        <!-- Favicon & App Icons -->
        <link rel="icon" type="image/png" href="/logo-vertical-clean.png" />
        <link rel="apple-touch-icon" href="/logo-vertical-clean.png" />

        <!-- Open Graph / Facebook / WhatsApp / Telegram -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Ocean2Joy" />
        <meta property="og:url" content="https://ocean2joy.com/" />
        <meta property="og:title" content="Ocean2Joy — Digital Video Production Studio" />
        <meta property="og:description" content="Dive into an ocean of video possibilities. End-to-end digital video production through a transparent 12-stage workflow — pay only after you accept the final result." />
        <meta property="og:image" content="https://ocean2joy.com/logo-horizontal.png" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Ocean2Joy — Digital Video Production Studio" />
        <meta name="twitter:description" content="Dive into an ocean of video possibilities. End-to-end digital video production through a transparent 12-stage workflow." />
        <meta name="twitter:image" content="https://ocean2joy.com/logo-horizontal.png" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />

        <!-- Organization schema for Google Knowledge Graph + AI search context -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "Ocean2Joy",
            "url": "https://ocean2joy.com",
            "logo": "https://ocean2joy.com/logo-horizontal.png",
            "description": "Boutique digital video production studio offering cinematic live-action, VFX, professional editing and AI-generated video through a transparent 12-stage workflow.",
            "founder": { "@type": "Person", "name": "Vera Iambaeva" },
            "address": {
                "@type": "PostalAddress",
                "addressLocality": "Tbilisi",
                "addressCountry": "GE"
            },
            "taxID": "302335809",
            "areaServed": "Worldwide",
            "knowsAbout": ["video production","video editing","visual effects","AI-generated video","post-production","color grading","sound design"]
        }
        </script>

        <!-- WebSite schema: enables sitelinks searchbox + clarifies canonical site identity -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Ocean2Joy",
            "url": "https://ocean2joy.com",
            "publisher": { "@type": "Organization", "name": "Ocean2Joy" }
        }
        </script>
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
