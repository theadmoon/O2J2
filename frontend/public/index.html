<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0ea5e9" />

        <!-- Primary SEO -->
        <title>Ocean2Joy — Digital Video Production Studio</title>
        <meta name="description" content="Digital video production studio. Live-action with actors, cinematic VFX and AI-generated video. Pay only after you accept the final result." />
        <meta name="keywords" content="video production studio, live-action video, cinematic VFX, AI video generation, AI-generated video, video editing, post-production, motion graphics, color grading, commercial video, brand video, explainer video, Ocean2Joy" />
        <meta name="author" content="Ocean2Joy" />
        <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
        <link rel="canonical" href="https://ocean2joy.com/" />

        <!-- Favicon & App Icons -->
        <link rel="icon" type="image/png" href="/logo-vertical-clean.png" />
        <link rel="apple-touch-icon" href="/logo-vertical-clean.png" />

        <!-- Open Graph / Facebook / WhatsApp / Telegram -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Ocean2Joy" />
        <meta property="og:url" content="https://ocean2joy.com/" />
        <meta property="og:title" content="Ocean2Joy — Digital Video Production Studio" />
        <meta property="og:description" content="Live-action with actors, cinematic VFX & AI-generated video. Transparent 12-stage workflow — pay only after you accept the final result." />
        <meta property="og:image" content="https://ocean2joy.com/logo-horizontal.png" />
        <meta property="og:image:width" content="2752" />
        <meta property="og:image:height" content="1536" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Ocean2Joy — Digital Video Production Studio" />
        <meta name="twitter:description" content="Live-action with actors, cinematic VFX & AI-generated video. Transparent 12-stage workflow." />
        <meta name="twitter:image" content="https://ocean2joy.com/logo-horizontal.png" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />

        <!-- Organization + ProfessionalService schema for Google Knowledge Graph + AI search context.
             logo uses the stacked/vertical composition — preferred for brand panel display. -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": ["Organization", "ProfessionalService"],
            "@id": "https://ocean2joy.com/#organization",
            "name": "Ocean2Joy",
            "alternateName": "Ocean2joy Video Production Studio",
            "url": "https://ocean2joy.com",
            "logo": {
                "@type": "ImageObject",
                "url": "https://ocean2joy.com/logo-vertical.png",
                "width": 2752,
                "height": 1536
            },
            "image": "https://ocean2joy.com/logo-vertical.png",
            "description": "Digital video production studio offering live-action with actors, cinematic VFX and AI-generated video. Transparent 12-stage workflow, pay only after you accept the final result.",
            "slogan": "Dive into an ocean of video possibilities",
            "founder": { "@type": "Person", "name": "Vera Iambaeva" },
            "address": {
                "@type": "PostalAddress",
                "addressLocality": "Tbilisi",
                "addressCountry": "GE"
            },
            "taxID": "302335809",
            "areaServed": "Worldwide",
            "priceRange": "$$",
            "serviceType": ["Live-action video production","Cinematic VFX","AI-generated video","Video editing and post-production","Motion graphics","Color grading"],
            "knowsAbout": ["video production","live-action shooting","visual effects","AI-generated video","post-production","color grading","sound design","motion graphics","commercial video","brand films","explainer videos"],
            "hasOfferCatalog": {
                "@type": "OfferCatalog",
                "name": "Ocean2Joy video production services",
                "itemListElement": [
                    {
                        "@type": "Offer",
                        "itemOffered": {
                            "@type": "Service",
                            "name": "Custom Video Production with Actors",
                            "url": "https://ocean2joy.com/services/custom-video",
                            "description": "Live-action shoots with professional performers, custom scripts and 4K filming. Ideal for commercials, brand films and educational content."
                        }
                    },
                    {
                        "@type": "Offer",
                        "itemOffered": {
                            "@type": "Service",
                            "name": "Professional Video Editing & Special Effects",
                            "url": "https://ocean2joy.com/services/video-editing",
                            "description": "Professional editing, cinematic VFX, motion graphics, color grading and sound design for existing footage."
                        }
                    },
                    {
                        "@type": "Offer",
                        "itemOffered": {
                            "@type": "Service",
                            "name": "AI-Generated Video Content",
                            "url": "https://ocean2joy.com/services/ai-video",
                            "description": "Director-guided AI video creation — worlds, characters and motion that would be impossible or prohibitively expensive to shoot on a real set."
                        }
                    }
                ]
            }
        }
        </script>

        <!-- WebSite schema: clarifies canonical site identity to search engines. -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "@id": "https://ocean2joy.com/#website",
            "name": "Ocean2Joy",
            "url": "https://ocean2joy.com",
            "inLanguage": "en",
            "publisher": { "@id": "https://ocean2joy.com/#organization" }
        }
        </script>
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
